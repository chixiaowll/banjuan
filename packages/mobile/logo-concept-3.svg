<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#1e272e"/>
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9"/>
      <stop offset="100%" style="stop-color:#b2bec3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg3)"/>

  <!-- Abstract half-scroll: single flowing brush stroke -->
  <!-- The stroke forms a half-unfurled scroll shape -->
  <path d="M 140 340
           C 140 180, 180 130, 260 130
           C 340 130, 360 180, 360 220
           C 360 260, 340 280, 310 280
           C 280 280, 270 260, 270 240"
        fill="none" stroke="url(#ink)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>

  <!-- Ink dot/seal -->
  <circle cx="270" cy="240" r="10" fill="#e17055" opacity="0.9"/>

  <!-- Bottom text -->
  <text x="256" y="430" font-family="STKaiti, KaiTi, serif" font-size="48" fill="#dfe6e9" text-anchor="middle" opacity="0.6">半卷</text>
</svg>
