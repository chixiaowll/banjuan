<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="scroll" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b7"/>
      <stop offset="100%" style="stop-color:#d4b896"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#f0d78c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Half-unrolled scroll body -->
  <!-- Unrolled part (flat page) -->
  <path d="M 130 140 L 310 140 L 310 380 L 130 380 Z" fill="url(#scroll)" opacity="0.95"/>

  <!-- Page lines (text suggestion) -->
  <line x1="155" y1="185" x2="285" y2="185" stroke="#a08060" stroke-width="2" opacity="0.3"/>
  <line x1="155" y1="210" x2="270" y2="210" stroke="#a08060" stroke-width="2" opacity="0.3"/>
  <line x1="155" y1="235" x2="280" y2="235" stroke="#a08060" stroke-width="2" opacity="0.3"/>
  <line x1="155" y1="260" x2="260" y2="260" stroke="#a08060" stroke-width="2" opacity="0.3"/>
  <line x1="155" y1="285" x2="275" y2="285" stroke="#a08060" stroke-width="2" opacity="0.3"/>
  <line x1="155" y1="310" x2="265" y2="310" stroke="#a08060" stroke-width="2" opacity="0.3"/>
  <line x1="155" y1="335" x2="250" y2="335" stroke="#a08060" stroke-width="2" opacity="0.3"/>

  <!-- Rolled part (cylinder) -->
  <ellipse cx="330" cy="260" rx="30" ry="120" fill="#c9a84c" opacity="0.15"/>
  <path d="M 310 140 Q 370 145, 370 260 Q 370 375, 310 380" fill="url(#scroll)" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- Scroll roll shadow/depth -->
  <path d="M 310 140 Q 340 145, 340 260 Q 340 375, 310 380" fill="#c4a070" opacity="0.4"/>

  <!-- Roll end curl -->
  <ellipse cx="370" cy="260" rx="12" ry="110" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.6"/>

  <!-- Top and bottom scroll caps -->
  <rect x="300" y="125" width="80" height="8" rx="4" fill="url(#gold)" opacity="0.8"/>
  <rect x="300" y="382" width="80" height="8" rx="4" fill="url(#gold)" opacity="0.8"/>

  <!-- "半" character watermark -->
  <text x="210" y="290" font-family="STSong, SimSun, serif" font-size="100" fill="#c9a84c" opacity="0.15" text-anchor="middle">半</text>
</svg>
