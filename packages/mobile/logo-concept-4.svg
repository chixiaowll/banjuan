<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f1e4"/>
      <stop offset="100%" style="stop-color:#ede3d0"/>
    </linearGradient>
  </defs>

  <!-- macOS safe area: 824x824 centered in 1024x1024 -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg4)"/>

  <!-- Content group - centered in safe area -->
  <g transform="translate(155, 200)">
    <!-- Bamboo slips -->
    <g opacity="0.88">
      <rect x="100" y="60" width="42" height="500" rx="5" fill="#c9a84c" stroke="#a08030" stroke-width="0.8"/>
      <rect x="152" y="60" width="42" height="500" rx="5" fill="#c9a84c" stroke="#a08030" stroke-width="0.8"/>
      <rect x="204" y="60" width="42" height="500" rx="5" fill="#c9a84c" stroke="#a08030" stroke-width="0.8"/>
      <rect x="256" y="60" width="42" height="500" rx="5" fill="#c9a84c" stroke="#a08030" stroke-width="0.8"/>
      <rect x="308" y="60" width="42" height="500" rx="5" fill="#c9a84c" stroke="#a08030" stroke-width="0.8"/>
      <rect x="360" y="60" width="42" height="500" rx="5" fill="#c9a84c" stroke="#a08030" stroke-width="0.8"/>
    </g>

    <!-- Vertical text on bamboo strips -->
    <g font-family="STKaiti, KaiTi, serif" font-size="40" fill="#5a3e1b" opacity="0.5">
      <text x="121" y="220" text-anchor="middle">知</text>
      <text x="121" y="270" text-anchor="middle">者</text>
      <text x="121" y="320" text-anchor="middle">不</text>
      <text x="121" y="370" text-anchor="middle">惑</text>
      <text x="173" y="220" text-anchor="middle">仁</text>
      <text x="173" y="270" text-anchor="middle">者</text>
      <text x="173" y="320" text-anchor="middle">不</text>
      <text x="173" y="370" text-anchor="middle">忧</text>
      <text x="225" y="220" text-anchor="middle">勇</text>
      <text x="225" y="270" text-anchor="middle">者</text>
      <text x="225" y="320" text-anchor="middle">不</text>
      <text x="225" y="370" text-anchor="middle">惧</text>
    </g>

    <!-- Binding cords -->
    <line x1="92" y1="250" x2="410" y2="250" stroke="#8b4513" stroke-width="4" opacity="0.5"/>
    <line x1="92" y1="430" x2="410" y2="430" stroke="#8b4513" stroke-width="4" opacity="0.5"/>

    <!-- Rolled-up right portion -->
    <g transform="translate(405, 60)">
      <path d="M 0 0 C 50 0, 100 35, 115 110 C 130 185, 125 300, 115 360 C 105 420, 50 480, 0 480"
            fill="#c9a84c" stroke="#a08030" stroke-width="1.5"/>
      <path d="M 0 0 C 30 10, 65 45, 75 110 C 85 185, 80 300, 75 360 C 65 420, 30 470, 0 480"
            fill="#b89840" opacity="0.5"/>
      <ellipse cx="115" cy="240" rx="20" ry="110" fill="none" stroke="#a08030" stroke-width="2" opacity="0.35"/>
    </g>
  </g>

  <!-- Red seal stamp -->
  <rect x="620" y="710" width="100" height="100" rx="6" fill="#c44040" opacity="0.75"/>
  <text x="670" y="776" font-family="STKaiti, KaiTi, serif" font-size="56" fill="#f8f1e4" text-anchor="middle">卷</text>
</svg>
