appId: com.banjuan.app
productName: 半卷
copyright: Copyright © 2026
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - resources/**/*
  - "!node_modules/**/*.{ts,map,md,txt}"
  - "!node_modules/**/{test,tests,__tests__,docs,doc,example,examples,.github}/**"
  - "!node_modules/**/{CHANGELOG,changelog,README,readme,LICENSE,license,LICENCE}*"
  - "!node_modules/better-sqlite3/{deps,build/Release/obj,src,bin}/**"
  - "!node_modules/pdfjs-dist/**"
  - "!node_modules/mermaid/**"
  - "!node_modules/lucide-react/**"
  - "!node_modules/elkjs/**"
  - "!node_modules/@shikijs/**"
  - "!node_modules/shiki/**"
  - "!node_modules/@mantine/**"
  - "!node_modules/@blocknote/**"
  - "!node_modules/@codemirror/**"
  - "!node_modules/@xyflow/**"
  - "!node_modules/framer-motion/**"
  - "!node_modules/d3/**"
  - "!node_modules/epubjs/**"
  - "!node_modules/react/**"
  - "!node_modules/react-dom/**"
  - "!node_modules/react-markdown/**"
  - "!node_modules/zustand/**"
extraResources:
  - from: resources/cli-bundle/
    to: cli/
    filter:
      - "**/*"
  - from: ../../plugins/
    to: plugins/
    filter:
      - "**/*"
      - "!**/.runtime/**"
      - "!**/node_modules/**"
      - "!**/config.json"
  # pdfjs legacy build for server-side PDF text extraction (loaded at runtime by
  # the main process; not bundled because vite breaks its Node self-polyfill).
  - from: node_modules/pdfjs-dist/legacy/build/pdf.mjs
    to: pdfjs/pdf.mjs
extraMetadata:
  main: dist/main/index.js
mac:
  icon: resources/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
dmg:
  title: "半卷"
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
win:
  icon: resources/icon.png
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  icon: resources/icon.png
  target:
    - AppImage
